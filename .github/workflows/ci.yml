name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  webpage-check:
    name: Webpage check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run webpage checks
        run: node scripts/check-webpage.mjs
