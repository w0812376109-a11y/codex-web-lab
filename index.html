<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>待办提醒</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f2f2f7;
      --panel: rgba(255, 255, 255, 0.92);
      --text: #1c1c1e;
      --muted: #8e8e93;
      --line: #d1d1d6;
      --accent: #007aff;
      --accent-dark: #005ecb;
      --danger: #ff3b30;
      --done: #34c759;
      --warning: #ff9500;
      --shadow: rgba(0, 0, 0, 0.08);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% -8%, rgba(0, 122, 255, 0.15), transparent 30%),
        radial-gradient(circle at 92% 2%, rgba(52, 199, 89, 0.13), transparent 25%),
        var(--bg);
      color: var(--text);
    }

    main {
      width: min(760px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 44px 0;
    }

    header {
      margin-bottom: 18px;
    }

    .hero {
      position: relative;
      min-height: 166px;
      display: flex;
      align-items: flex-end;
      padding: 22px;
      overflow: hidden;
      border-radius: 24px;
      background-image:
        linear-gradient(90deg, rgba(255, 255, 255, 0.94) 0%, rgba(255, 255, 255, 0.76) 42%, rgba(255, 255, 255, 0.18) 100%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(242, 242, 247, 0.65)),
        url("assets/ios-reminders-hero.png");
      background-position: center;
      background-size: cover;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.08);
    }

    .hero-copy {
      max-width: 560px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: #636366;
      line-height: 1.5;
    }

    .panel {
      background: var(--panel);
      border: 0.5px solid rgba(60, 60, 67, 0.16);
      border-radius: 22px;
      box-shadow: 0 18px 44px var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 200px auto;
      gap: 10px;
      padding: 16px;
      border-bottom: 0.5px solid var(--line);
    }

    input {
      min-width: 0;
      height: 46px;
      border: 0;
      border-radius: 12px;
      padding: 0 14px;
      font-size: 16px;
      background: #f2f2f7;
      color: var(--text);
      outline: none;
    }

    input:focus {
      box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.18);
    }

    button {
      height: 46px;
      border: 0;
      border-radius: 12px;
      padding: 0 15px;
      font: inherit;
      font-weight: 650;
      cursor: pointer;
    }

    .add-button {
      color: #ffffff;
      background: var(--accent);
      box-shadow: 0 8px 18px rgba(0, 122, 255, 0.22);
    }

    .add-button:hover {
      background: var(--accent-dark);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 0.5px solid var(--line);
      color: var(--muted);
      font-size: 14px;
      flex-wrap: wrap;
    }

    .clear-button {
      height: 34px;
      color: var(--danger);
      background: transparent;
      border: 0;
      opacity: 0.82;
    }

    .clear-button:hover {
      background: rgba(255, 59, 48, 0.1);
    }

    .reminder-button {
      height: 34px;
      color: var(--accent);
      background: transparent;
      border: 0;
      padding: 0 12px;
      font-weight: 600;
    }

    .reminder-button:hover {
      background: rgba(0, 122, 255, 0.1);
    }

    .alarm-banner {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      padding: 12px 14px;
      color: #4a2c00;
      background: rgba(255, 204, 0, 0.22);
      border: 0.5px solid rgba(255, 149, 0, 0.24);
      border-radius: 16px;
    }

    .alarm-banner[hidden] {
      display: none;
    }

    .dismiss-button {
      height: 34px;
      color: #ffffff;
      background: var(--warning);
      border-radius: 10px;
    }

    .section {
      padding: 14px 0 4px;
    }

    .section + .section {
      border-top: 8px solid #f2f2f7;
    }

    .section.completed-section {
      background: rgba(242, 242, 247, 0.64);
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 16px 10px;
    }

    h2 {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .section-count {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    li {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      align-items: center;
      gap: 12px;
      min-height: 62px;
      padding: 10px 16px;
      background: rgba(255, 255, 255, 0.72);
      border-top: 0.5px solid rgba(209, 209, 214, 0.75);
    }

    .completed-section li {
      min-height: 54px;
      background: rgba(255, 255, 255, 0.46);
    }

    li:last-child {
      border-bottom: 0;
    }

    .toggle {
      width: 22px;
      height: 22px;
      accent-color: var(--done);
      cursor: pointer;
    }

    .completed .toggle {
      accent-color: var(--muted);
    }

    .task-text {
      overflow-wrap: anywhere;
      line-height: 1.45;
    }

    .task-content {
      min-width: 0;
    }

    .task-reminder {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .task-reminder.due {
      color: var(--warning);
      font-weight: 650;
    }

    .completed .task-text {
      color: var(--muted);
      font-weight: 500;
      text-decoration: line-through;
    }

    .completed .task-reminder {
      color: #a1a1a6;
    }

    .delete-button {
      width: 34px;
      padding: 0;
      color: var(--danger);
      background: transparent;
      border: 1px solid transparent;
      font-size: 18px;
      line-height: 1;
      opacity: 0.58;
    }

    .delete-button:hover {
      opacity: 1;
      background: rgba(255, 59, 48, 0.1);
    }

    .empty {
      padding: 24px 16px 30px;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
    }

    @media (max-width: 560px) {
      main {
        width: min(100vw - 24px, 760px);
        padding: 26px 0;
      }

      h1 {
        font-size: 28px;
      }

      form {
        grid-template-columns: 1fr;
      }

      .add-button {
        width: 100%;
      }

      .toolbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .alarm-banner {
        grid-template-columns: 1fr;
      }

      .hero {
        min-height: 150px;
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header class="hero">
      <div class="hero-copy">
        <h1>待办提醒</h1>
        <p>记录事项，设置提醒，把已完成任务收纳到底部。</p>
      </div>
    </header>

    <div id="alarm-banner" class="alarm-banner" role="status" hidden>
      <span id="alarm-message"></span>
      <button id="dismiss-alarm" class="dismiss-button" type="button">知道了</button>
    </div>

    <section class="panel" aria-label="Todo list">
      <form id="task-form">
        <input id="task-input" type="text" autocomplete="off" placeholder="添加事项" aria-label="事项">
        <input id="reminder-input" type="datetime-local" aria-label="提醒时间">
        <button class="add-button" type="submit">添加</button>
      </form>

      <div class="toolbar">
        <span id="task-count">0 项待办</span>
        <button id="enable-notifications" class="reminder-button" type="button">开启通知</button>
        <button id="clear-completed" class="clear-button" type="button">清除已完成</button>
      </div>

      <section class="section" aria-labelledby="active-heading">
        <div class="section-header">
          <h2 id="active-heading">待办</h2>
          <span id="active-count" class="section-count">0</span>
        </div>
        <ul id="active-task-list"></ul>
        <div id="active-empty-state" class="empty">暂无待办事项。</div>
      </section>

      <section class="section completed-section" aria-labelledby="completed-heading">
        <div class="section-header">
          <h2 id="completed-heading">已完成</h2>
          <span id="completed-count" class="section-count">0</span>
        </div>
        <ul id="completed-task-list"></ul>
        <div id="completed-empty-state" class="empty">完成的事项会收纳在这里。</div>
      </section>
    </section>
  </main>

  <script>
    const storageKey = "codex-todo-lab.tasks";
    const form = document.querySelector("#task-form");
    const input = document.querySelector("#task-input");
    const reminderInput = document.querySelector("#reminder-input");
    const activeList = document.querySelector("#active-task-list");
    const completedList = document.querySelector("#completed-task-list");
    const count = document.querySelector("#task-count");
    const activeCount = document.querySelector("#active-count");
    const completedCount = document.querySelector("#completed-count");
    const activeEmpty = document.querySelector("#active-empty-state");
    const completedEmpty = document.querySelector("#completed-empty-state");
    const clearCompleted = document.querySelector("#clear-completed");
    const enableNotifications = document.querySelector("#enable-notifications");
    const alarmBanner = document.querySelector("#alarm-banner");
    const alarmMessage = document.querySelector("#alarm-message");
    const dismissAlarm = document.querySelector("#dismiss-alarm");

    let tasks = loadTasks();
    let reminderTimers = new Map();

    function loadTasks() {
      try {
        return JSON.parse(localStorage.getItem(storageKey)) || [];
      } catch {
        return [];
      }
    }

    function saveTasks() {
      localStorage.setItem(storageKey, JSON.stringify(tasks));
    }

    function renderTasks() {
      activeList.innerHTML = "";
      completedList.innerHTML = "";

      const activeTasks = tasks.filter((task) => !task.completed);
      const completedTasks = tasks.filter((task) => task.completed);

      activeTasks.forEach((task) => {
        activeList.append(createTaskItem(task));
      });

      completedTasks.forEach((task) => {
        completedList.append(createTaskItem(task));
      });

      const remaining = activeTasks.length;
      count.textContent = `${remaining} 项待办`;
      activeCount.textContent = String(activeTasks.length);
      completedCount.textContent = String(completedTasks.length);
      activeEmpty.hidden = activeTasks.length > 0;
      completedEmpty.hidden = completedTasks.length > 0;
      clearCompleted.disabled = completedTasks.length === 0;
      scheduleReminders();
    }

    function createTaskItem(task) {
      const item = document.createElement("li");
      item.className = task.completed ? "completed" : "";

      const checkbox = document.createElement("input");
      checkbox.className = "toggle";
      checkbox.type = "checkbox";
      checkbox.checked = task.completed;
      checkbox.setAttribute("aria-label", `Toggle ${task.text}`);
      checkbox.addEventListener("change", () => toggleTask(task.id));

      const content = document.createElement("div");
      content.className = "task-content";

      const text = document.createElement("span");
      text.className = "task-text";
      text.textContent = task.text;

      const reminder = document.createElement("span");
      reminder.className = "task-reminder";
      reminder.textContent = reminderLabel(task);
      if (task.reminderAt && Date.parse(task.reminderAt) <= Date.now() && !task.completed) {
        reminder.classList.add("due");
      }

      const deleteButton = document.createElement("button");
      deleteButton.className = "delete-button";
      deleteButton.type = "button";
      deleteButton.textContent = "×";
      deleteButton.setAttribute("aria-label", `Delete ${task.text}`);
      deleteButton.addEventListener("click", () => deleteTask(task.id));

      content.append(text, reminder);
      item.append(checkbox, content, deleteButton);
      return item;
    }

    function addTask(text, reminderAt) {
      tasks = [
        { id: crypto.randomUUID(), text, reminderAt, completed: false, reminded: false },
        ...tasks,
      ];
      saveTasks();
      renderTasks();
    }

    function toggleTask(id) {
      tasks = tasks.map((task) => (
        task.id === id ? { ...task, completed: !task.completed } : task
      ));
      saveTasks();
      renderTasks();
    }

    function deleteTask(id) {
      tasks = tasks.filter((task) => task.id !== id);
      saveTasks();
      renderTasks();
    }

    function reminderLabel(task) {
      if (!task.reminderAt) return "无提醒";
      const date = new Date(task.reminderAt);
      const label = new Intl.DateTimeFormat("zh-CN", {
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit",
      }).format(date);
      if (task.completed) return `提醒：${label}`;
      if (date <= new Date()) return `已到期：${label}`;
      return `提醒：${label}`;
    }

    function scheduleReminders() {
      reminderTimers.forEach((timerId) => clearTimeout(timerId));
      reminderTimers = new Map();

      tasks.forEach((task) => {
        if (!task.reminderAt || task.completed || task.reminded) return;
        const delay = Date.parse(task.reminderAt) - Date.now();
        if (delay <= 0) {
          triggerReminder(task);
          return;
        }
        const timerId = setTimeout(() => triggerReminder(task), delay);
        reminderTimers.set(task.id, timerId);
      });
    }

    function triggerReminder(task) {
      const currentTask = tasks.find((item) => item.id === task.id);
      if (!currentTask || currentTask.completed || currentTask.reminded) return;

      tasks = tasks.map((item) => (
        item.id === task.id ? { ...item, reminded: true } : item
      ));
      saveTasks();

      alarmMessage.textContent = `提醒：${currentTask.text}`;
      alarmBanner.hidden = false;
      playAlarmTone();
      showSystemNotification(currentTask);
      renderTasks();
    }

    function playAlarmTone() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;

      const audioContext = new AudioContext();
      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();

      oscillator.type = "sine";
      oscillator.frequency.setValueAtTime(880, audioContext.currentTime);
      gain.gain.setValueAtTime(0.001, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.2, audioContext.currentTime + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.55);

      oscillator.connect(gain);
      gain.connect(audioContext.destination);
      oscillator.start();
      oscillator.stop(audioContext.currentTime + 0.6);
    }

    function showSystemNotification(task) {
      if (!("Notification" in window) || Notification.permission !== "granted") return;
      new Notification("事项提醒", {
        body: task.text,
      });
    }

    function updateNotificationButton() {
      if (!("Notification" in window)) {
        enableNotifications.textContent = "通知不可用";
        enableNotifications.disabled = true;
        return;
      }

      if (Notification.permission === "granted") {
        enableNotifications.textContent = "通知已开启";
        enableNotifications.disabled = true;
      } else if (Notification.permission === "denied") {
        enableNotifications.textContent = "通知已被阻止";
        enableNotifications.disabled = true;
      } else {
        enableNotifications.textContent = "开启通知";
        enableNotifications.disabled = false;
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      addTask(text, reminderInput.value || null);
      input.value = "";
      reminderInput.value = "";
      input.focus();
    });

    clearCompleted.addEventListener("click", () => {
      tasks = tasks.filter((task) => !task.completed);
      saveTasks();
      renderTasks();
    });

    enableNotifications.addEventListener("click", async () => {
      if (!("Notification" in window)) return;
      await Notification.requestPermission();
      updateNotificationButton();
    });

    dismissAlarm.addEventListener("click", () => {
      alarmBanner.hidden = true;
    });

    updateNotificationButton();
    renderTasks();
  </script>
</body>
</html>
