<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Codex Todo Lab</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --panel: #ffffff;
      --text: #172033;
      --muted: #657086;
      --line: #dfe6f0;
      --accent: #1f7a8c;
      --accent-dark: #155d6c;
      --danger: #b42318;
      --done: #52796f;
      --warning: #a15c07;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
    }

    main {
      width: min(760px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 48px 0;
    }

    header {
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      font-weight: 750;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 48px rgba(38, 54, 77, 0.08);
      overflow: hidden;
    }

    form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 210px auto;
      gap: 12px;
      padding: 18px;
      border-bottom: 1px solid var(--line);
    }

    input {
      min-width: 0;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 13px;
      font-size: 16px;
      color: var(--text);
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(31, 122, 140, 0.16);
    }

    button {
      height: 44px;
      border: 0;
      border-radius: 6px;
      padding: 0 16px;
      font: inherit;
      font-weight: 650;
      cursor: pointer;
    }

    .add-button {
      color: #ffffff;
      background: var(--accent);
    }

    .add-button:hover {
      background: var(--accent-dark);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
    }

    .clear-button {
      height: 34px;
      color: var(--danger);
      background: transparent;
      border: 1px solid rgba(180, 35, 24, 0.28);
    }

    .clear-button:hover {
      background: rgba(180, 35, 24, 0.08);
    }

    .reminder-button {
      height: 34px;
      color: var(--accent-dark);
      background: transparent;
      border: 1px solid rgba(31, 122, 140, 0.28);
    }

    .reminder-button:hover {
      background: rgba(31, 122, 140, 0.08);
    }

    .alarm-banner {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      padding: 12px 14px;
      color: #4f2f03;
      background: #fff4d7;
      border: 1px solid #f3d48b;
      border-radius: 8px;
    }

    .alarm-banner[hidden] {
      display: none;
    }

    .dismiss-button {
      height: 34px;
      color: #ffffff;
      background: var(--warning);
    }

    ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    li {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      align-items: center;
      gap: 12px;
      min-height: 58px;
      padding: 10px 18px;
      border-bottom: 1px solid var(--line);
    }

    li:last-child {
      border-bottom: 0;
    }

    .toggle {
      width: 22px;
      height: 22px;
      accent-color: var(--done);
      cursor: pointer;
    }

    .task-text {
      overflow-wrap: anywhere;
      line-height: 1.45;
    }

    .task-content {
      min-width: 0;
    }

    .task-reminder {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .task-reminder.due {
      color: var(--warning);
      font-weight: 650;
    }

    .completed .task-text {
      color: var(--muted);
      text-decoration: line-through;
    }

    .delete-button {
      width: 38px;
      padding: 0;
      color: var(--danger);
      background: transparent;
      border: 1px solid transparent;
      font-size: 20px;
      line-height: 1;
    }

    .delete-button:hover {
      border-color: rgba(180, 35, 24, 0.25);
      background: rgba(180, 35, 24, 0.08);
    }

    .empty {
      padding: 34px 18px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 560px) {
      main {
        width: min(100vw - 24px, 760px);
        padding: 28px 0;
      }

      h1 {
        font-size: 28px;
      }

      form {
        grid-template-columns: 1fr;
      }

      .add-button {
        width: 100%;
      }

      .toolbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .alarm-banner {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Codex Todo Lab</h1>
      <p>A small browser app for practicing frontend edits, preview, reminders, and verification.</p>
    </header>

    <div id="alarm-banner" class="alarm-banner" role="status" hidden>
      <span id="alarm-message"></span>
      <button id="dismiss-alarm" class="dismiss-button" type="button">Dismiss</button>
    </div>

    <section class="panel" aria-label="Todo list">
      <form id="task-form">
        <input id="task-input" type="text" autocomplete="off" placeholder="Add a task" aria-label="Task">
        <input id="reminder-input" type="datetime-local" aria-label="Reminder time">
        <button class="add-button" type="submit">Add Task</button>
      </form>

      <div class="toolbar">
        <span id="task-count">0 tasks</span>
        <button id="enable-notifications" class="reminder-button" type="button">Enable Notifications</button>
        <button id="clear-completed" class="clear-button" type="button">Clear Completed</button>
      </div>

      <ul id="task-list"></ul>
      <div id="empty-state" class="empty">No tasks yet.</div>
    </section>
  </main>

  <script>
    const storageKey = "codex-todo-lab.tasks";
    const form = document.querySelector("#task-form");
    const input = document.querySelector("#task-input");
    const reminderInput = document.querySelector("#reminder-input");
    const list = document.querySelector("#task-list");
    const count = document.querySelector("#task-count");
    const empty = document.querySelector("#empty-state");
    const clearCompleted = document.querySelector("#clear-completed");
    const enableNotifications = document.querySelector("#enable-notifications");
    const alarmBanner = document.querySelector("#alarm-banner");
    const alarmMessage = document.querySelector("#alarm-message");
    const dismissAlarm = document.querySelector("#dismiss-alarm");

    let tasks = loadTasks();
    let reminderTimers = new Map();

    function loadTasks() {
      try {
        return JSON.parse(localStorage.getItem(storageKey)) || [];
      } catch {
        return [];
      }
    }

    function saveTasks() {
      localStorage.setItem(storageKey, JSON.stringify(tasks));
    }

    function renderTasks() {
      list.innerHTML = "";

      tasks.forEach((task) => {
        const item = document.createElement("li");
        item.className = task.completed ? "completed" : "";

        const checkbox = document.createElement("input");
        checkbox.className = "toggle";
        checkbox.type = "checkbox";
        checkbox.checked = task.completed;
        checkbox.setAttribute("aria-label", `Toggle ${task.text}`);
        checkbox.addEventListener("change", () => toggleTask(task.id));

        const content = document.createElement("div");
        content.className = "task-content";

        const text = document.createElement("span");
        text.className = "task-text";
        text.textContent = task.text;

        const reminder = document.createElement("span");
        reminder.className = "task-reminder";
        reminder.textContent = reminderLabel(task);
        if (task.reminderAt && Date.parse(task.reminderAt) <= Date.now() && !task.completed) {
          reminder.classList.add("due");
        }

        const deleteButton = document.createElement("button");
        deleteButton.className = "delete-button";
        deleteButton.type = "button";
        deleteButton.textContent = "×";
        deleteButton.setAttribute("aria-label", `Delete ${task.text}`);
        deleteButton.addEventListener("click", () => deleteTask(task.id));

        content.append(text, reminder);
        item.append(checkbox, content, deleteButton);
        list.append(item);
      });

      const remaining = tasks.filter((task) => !task.completed).length;
      count.textContent = `${remaining} ${remaining === 1 ? "task" : "tasks"} remaining`;
      empty.hidden = tasks.length > 0;
      clearCompleted.disabled = tasks.every((task) => !task.completed);
      scheduleReminders();
    }

    function addTask(text, reminderAt) {
      tasks = [
        { id: crypto.randomUUID(), text, reminderAt, completed: false, reminded: false },
        ...tasks,
      ];
      saveTasks();
      renderTasks();
    }

    function toggleTask(id) {
      tasks = tasks.map((task) => (
        task.id === id ? { ...task, completed: !task.completed } : task
      ));
      saveTasks();
      renderTasks();
    }

    function deleteTask(id) {
      tasks = tasks.filter((task) => task.id !== id);
      saveTasks();
      renderTasks();
    }

    function reminderLabel(task) {
      if (!task.reminderAt) return "No reminder";
      const date = new Date(task.reminderAt);
      const label = new Intl.DateTimeFormat(undefined, {
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit",
      }).format(date);
      if (task.completed) return `Reminder: ${label}`;
      if (date <= new Date()) return `Due: ${label}`;
      return `Reminder: ${label}`;
    }

    function scheduleReminders() {
      reminderTimers.forEach((timerId) => clearTimeout(timerId));
      reminderTimers = new Map();

      tasks.forEach((task) => {
        if (!task.reminderAt || task.completed || task.reminded) return;
        const delay = Date.parse(task.reminderAt) - Date.now();
        if (delay <= 0) {
          triggerReminder(task);
          return;
        }
        const timerId = setTimeout(() => triggerReminder(task), delay);
        reminderTimers.set(task.id, timerId);
      });
    }

    function triggerReminder(task) {
      const currentTask = tasks.find((item) => item.id === task.id);
      if (!currentTask || currentTask.completed || currentTask.reminded) return;

      tasks = tasks.map((item) => (
        item.id === task.id ? { ...item, reminded: true } : item
      ));
      saveTasks();

      alarmMessage.textContent = `Reminder: ${currentTask.text}`;
      alarmBanner.hidden = false;
      playAlarmTone();
      showSystemNotification(currentTask);
      renderTasks();
    }

    function playAlarmTone() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;

      const audioContext = new AudioContext();
      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();

      oscillator.type = "sine";
      oscillator.frequency.setValueAtTime(880, audioContext.currentTime);
      gain.gain.setValueAtTime(0.001, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.2, audioContext.currentTime + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.55);

      oscillator.connect(gain);
      gain.connect(audioContext.destination);
      oscillator.start();
      oscillator.stop(audioContext.currentTime + 0.6);
    }

    function showSystemNotification(task) {
      if (!("Notification" in window) || Notification.permission !== "granted") return;
      new Notification("Task reminder", {
        body: task.text,
      });
    }

    function updateNotificationButton() {
      if (!("Notification" in window)) {
        enableNotifications.textContent = "Notifications Unavailable";
        enableNotifications.disabled = true;
        return;
      }

      if (Notification.permission === "granted") {
        enableNotifications.textContent = "Notifications Enabled";
        enableNotifications.disabled = true;
      } else if (Notification.permission === "denied") {
        enableNotifications.textContent = "Notifications Blocked";
        enableNotifications.disabled = true;
      } else {
        enableNotifications.textContent = "Enable Notifications";
        enableNotifications.disabled = false;
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      addTask(text, reminderInput.value || null);
      input.value = "";
      reminderInput.value = "";
      input.focus();
    });

    clearCompleted.addEventListener("click", () => {
      tasks = tasks.filter((task) => !task.completed);
      saveTasks();
      renderTasks();
    });

    enableNotifications.addEventListener("click", async () => {
      if (!("Notification" in window)) return;
      await Notification.requestPermission();
      updateNotificationButton();
    });

    dismissAlarm.addEventListener("click", () => {
      alarmBanner.hidden = true;
    });

    updateNotificationButton();
    renderTasks();
  </script>
</body>
</html>
